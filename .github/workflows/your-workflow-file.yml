name: Build Blocklist

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 3:00 AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hostlist Compiler
        run: npm install -g @adguard/hostlist-compiler

      - name: Compile blocklist
        run: hostlist-compiler -c configuration.json -o blocklist

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist
          git diff --cached --quiet || git commit -m "Update blocklist"
          git push
